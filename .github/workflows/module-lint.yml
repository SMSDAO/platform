name: Module Lint

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**/*.psm1"
      - "bin/**/*.ps1"
      - "scripts/**/*.ps1"
      - "tests/**/*.ps1"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**/*.psm1"
      - "bin/**/*.ps1"
      - "scripts/**/*.ps1"
      - "tests/**/*.ps1"
  workflow_dispatch:

concurrency:
  group: module-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -MinimumVersion 1.21.0

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseSingularNouns `
            -ReportSummary

          $errors   = @($results | Where-Object Severity -eq Error)
          $warnings = @($results | Where-Object Severity -eq Warning)

          Write-Host "PSScriptAnalyzer: $($errors.Count) error(s), $($warnings.Count) warning(s)"

          if ($errors.Count -gt 0) {
            $errors | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($errors.Count) error(s). Fix before merging."
            exit 1
          }

          if ($warnings.Count -gt 0) {
            $warnings | Format-Table -AutoSize
            Write-Host "Warnings found — review before merging." -ForegroundColor Yellow
          }

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $allFiles = Get-ChildItem -Recurse -Include "*.psm1","*.ps1" |
                      Where-Object FullName -NotMatch "\.git"
          $errors = 0
          foreach ($file in $allFiles) {
            $parseErrors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName, [ref]$null, [ref]$parseErrors
            )
            if ($parseErrors.Count -gt 0) {
              Write-Host "SYNTAX ERROR in $($file.Name):" -ForegroundColor Red
              $parseErrors | ForEach-Object { Write-Host "  Line $($_.Extent.StartLineNumber): $_" }
              $errors++
            }
          }
          if ($errors -gt 0) {
            Write-Error "$errors file(s) have syntax errors."
            exit 1
          }
          Write-Host "Syntax check: $($allFiles.Count) files — all OK."
